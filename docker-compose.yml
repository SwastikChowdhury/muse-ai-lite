services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    # Override POSTGRES_URI from .env: inside the compose network the database is
    # reachable at the service name `postgres`, not localhost.
    environment:
      - POSTGRES_URI=postgresql+asyncpg://muse:muse@postgres:5432/muse
      - FRONTEND_URL=http://localhost:8000
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      - postgres
    # ML models (HF + Presidio/spaCy) load at import time before uvicorn listens;
    # allow several minutes on cold start so slow boot is not treated as failure.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: muse
      POSTGRES_PASSWORD: muse
      POSTGRES_DB: muse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_UID=muse-obs
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  chroma_data:
  prometheus_data:
  grafana_data:
  postgres_data: