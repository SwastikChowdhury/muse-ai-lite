services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    # Override POSTGRES_URI from .env: inside the compose network the database is
    # reachable at the service name `postgres`, not localhost.
    environment:
      - POSTGRES_URI=postgresql+asyncpg://muse:muse@postgres:5432/muse
      - FRONTEND_URL=http://localhost:8000
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: muse
      POSTGRES_PASSWORD: muse
      POSTGRES_DB: muse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  chroma_data:
  prometheus_data:
  grafana_data:
  postgres_data: